<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Cabin Beverage List</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #111827;
      color: white;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.22);
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      object-fit: contain;
      background: white;
      border-radius: 8px;
      padding: 3px;
    }

    .refresh-btn {
      border: none;
      background: rgba(255,255,255,0.14);
      color: white;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .refresh-btn:active {
      transform: scale(0.97);
    }

    .control-panel {
      display: grid;
      grid-template-columns: 200px 200px 1fr auto;
      gap: 10px;
      align-items: center;
    }

    select,
    input,
    button {
      font-size: 16px;
      font-family: inherit;
    }

    select,
    input {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 13px;
      outline: none;
      background: white;
      color: #111827;
    }

    input::placeholder {
      color: #9ca3af;
    }

    .toggle-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      background: #e5e7eb;
      color: #111827;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .toggle-btn.active {
      background: #2563eb;
      color: white;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px 14px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      color: #4b5563;
      font-size: 13px;
    }

    .summary {
      font-weight: 800;
    }

    .updated {
      text-align: right;
      font-size: 12px;
      color: #6b7280;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 5px 18px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 9px 26px rgba(0,0,0,0.12);
    }

    .image-wrap {
      width: 100%;
      height: 235px;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 14px;
      overflow: hidden;
      position: relative;
      text-align: center;
    }

   .image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #f3f4f6;
}

    .badge {
      position: absolute;
      left: 10px;
      top: 10px;
      background: rgba(17,24,39,0.78);
      color: white;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 900;
      z-index: 2;
    }

    .card-body {
      padding: 14px;
    }

    .code {
      font-size: 13px;
      color: #2563eb;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .name {
      font-size: 16px;
      line-height: 1.35;
      font-weight: 900;
      white-space: pre-line;
      min-height: 44px;
      margin-bottom: 10px;
    }

    .quick-info {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .chip {
      border-radius: 999px;
      padding: 5px 8px;
      background: #f3f4f6;
      font-size: 12px;
      font-weight: 800;
      color: #374151;
    }

    .chip.zero {
      background: #fee2e2;
      color: #dc2626;
    }

    .meta {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 5px 8px;
      font-size: 13px;
    }

    .label {
      color: #6b7280;
      font-weight: 900;
    }

    .value {
      color: #111827;
      white-space: pre-line;
      word-break: break-word;
    }

    .price {
      font-weight: 900;
    }

    .note {
      margin-top: 10px;
      padding: 8px;
      border-radius: 10px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 13px;
      font-weight: 800;
      white-space: pre-line;
    }

    .loading,
    .error,
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 18px;
      color: #6b7280;
      background: white;
      border-radius: 18px;
      line-height: 1.6;
    }

    .error {
      color: #dc2626;
      font-weight: 800;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.55);
      padding: 18px;
      overflow-y: auto;
    }

    .modal-backdrop.show {
      display: block;
    }

    .modal {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .modal-image {
      width: 100%;
      height: 430px;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      overflow: hidden;
      text-align: center;
    }

    .modal-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111827;
    }

    .modal-body {
      padding: 18px;
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 22px;
      line-height: 1.35;
      font-weight: 900;
      white-space: pre-line;
    }

    .close-btn {
      border: none;
      background: #f3f4f6;
      color: #111827;
      border-radius: 999px;
      width: 38px;
      height: 38px;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .detail-table {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 8px 12px;
      margin-top: 14px;
      font-size: 14px;
    }

    .detail-label {
      color: #6b7280;
      font-weight: 900;
    }

    .detail-value {
      color: #111827;
      white-space: pre-line;
      word-break: break-word;
    }

    @media (max-width: 800px) {
      header {
        padding: 10px 12px;
      }

      .title-row {
        margin-bottom: 10px;
        gap: 8px;
      }

      h1 {
        font-size: 20px;
      }

      .brand-title {
        gap: 8px;
      }

      .brand-logo {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        padding: 3px;
      }

      .refresh-btn {
        padding: 8px 10px;
        font-size: 14px;
      }

      .control-panel {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
        gap: 7px;
        align-items: center;
      }

      #typeFilter,
      #sortFilter {
        min-width: 0;
        height: 38px;
        padding: 6px 7px;
        font-size: 14px;
        border-radius: 10px;
      }

      #stockToggle {
        height: 38px;
        padding: 6px 8px;
        font-size: 13px;
        border-radius: 10px;
        white-space: nowrap;
      }

      #searchInput {
        grid-column: 1 / -1;
        height: 42px;
        padding: 8px 11px;
        font-size: 14px;
        border-radius: 11px;
      }

      main {
        padding: 12px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .image-wrap {
        height: 230px;
      }

      .status-row {
        display: block;
      }

      .updated {
        text-align: left;
        margin-top: 4px;
      }

      .modal-backdrop {
        padding: 10px;
      }

      .modal {
        margin: 10px auto;
        border-radius: 18px;
      }

      .modal-image {
        height: 310px;
      }

      .modal-title {
        font-size: 18px;
      }

      .detail-table {
        grid-template-columns: 100px 1fr;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="title-row">
      <h1 class="brand-title">
        <img src="SK_LOGO.png" alt="SK Logo" class="brand-logo">
        <span>Cabin Beverage List</span>
      </h1>
      <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
    </div>

    <div class="control-panel">
      <select id="typeFilter">
        <option value="">전체 종류</option>
      </select>

      <select id="sortFilter">
        <option value="codeAsc">관리번호순</option>
        <option value="priceDesc">가격 높은순</option>
        <option value="priceAsc">가격 낮은순</option>
        <option value="qtyDesc">수량 많은순</option>
         <option value="nameAsc">이름순</option>
      </select>

      <input id="searchInput" type="text" placeholder="와인명 / 관리번호 / 생산국 / 보관장소 검색" />

      <button id="stockToggle" class="toggle-btn" onclick="toggleStock()">0 제외 OFF</button>
    </div>
  </header>

  <main>
    <div class="status-row">
      <div id="summary" class="summary"></div>
      <div id="updated" class="updated"></div>
    </div>

    <div id="list" class="grid"></div>
  </main>

  <div id="modalBackdrop" class="modal-backdrop" onclick="closeModalByBackdrop(event)">
    <div class="modal">
      <div id="modalImage" class="modal-image"></div>

      <div class="modal-body">
        <div class="modal-top">
          <div>
            <div id="modalCode" class="code"></div>
            <div id="modalTitle" class="modal-title"></div>
          </div>
          <button class="close-btn" onclick="closeModal()">×</button>
        </div>

        <div id="modalDetail" class="detail-table"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwRG3fl2h6hQYo5FxE7MTGZWBLpIfOjhxMsMhUKfsabQj_pDLF-A4AB-rRJpuTkf7gz/exec';

    let allData = [];
    let excludeZeroStock = false;
    let imageCache = {};

    const typeFilter = document.getElementById('typeFilter');
    const sortFilter = document.getElementById('sortFilter');
    const searchInput = document.getElementById('searchInput');
    const stockToggle = document.getElementById('stockToggle');
    const list = document.getElementById('list');
    const summary = document.getElementById('summary');
    const updated = document.getElementById('updated');

    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalImage = document.getElementById('modalImage');
    const modalCode = document.getElementById('modalCode');
    const modalTitle = document.getElementById('modalTitle');
    const modalDetail = document.getElementById('modalDetail');

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

        window[callbackName] = function(data) {
          delete window[callbackName];
          script.remove();
          resolve(data);
        };

        const script = document.createElement('script');
        const separator = url.includes('?') ? '&' : '?';

        script.src = url + separator + 'callback=' + callbackName;

        script.onerror = function() {
          delete window[callbackName];
          script.remove();
          reject(new Error('JSONP load failed'));
        };

        document.body.appendChild(script);
      });
    }

async function loadData() {
  // 새로고침 시 기본값으로 초기화
  typeFilter.value = '';
  sortFilter.value = 'codeAsc';
  searchInput.value = '';

  excludeZeroStock = false;
  stockToggle.classList.remove('active');
  stockToggle.textContent = '0 제외 OFF';

  list.innerHTML = '<div class="loading">불러오는 중...</div>';
  summary.textContent = '';
  updated.textContent = '';

  // 1) 브라우저에 저장된 이전 데이터 즉시 표시
  const saved = localStorage.getItem('CABIN_BEVERAGE_CACHE');

  if (saved) {
    try {
      const cachedJson = JSON.parse(saved);

      if (cachedJson && cachedJson.ok && Array.isArray(cachedJson.data)) {
        allData = cachedJson.data || [];
        renderTypeOptions(cachedJson.types || []);
        updated.textContent = cachedJson.updatedAt ? `저장된 데이터: ${cachedJson.updatedAt}` : '저장된 데이터';
        renderList();
      }
    } catch (err) {
      localStorage.removeItem('CABIN_BEVERAGE_CACHE');
    }
  }

  // 2) 최신 데이터 다시 호출
  try {
    const json = await jsonp(API_URL + '?action=list&ts=' + Date.now());

    if (!json.ok) {
      throw new Error(json.error || '데이터를 불러오지 못했습니다.');
    }

    allData = json.data || [];
    imageCache = {};

    localStorage.setItem('CABIN_BEVERAGE_CACHE', JSON.stringify(json));

    renderTypeOptions(json.types || []);
    updated.textContent = json.updatedAt ? `업데이트: ${json.updatedAt}` : '';

    renderList();

  } catch (err) {
    if (!saved) {
      list.innerHTML = `
        <div class="error">
          데이터를 불러오지 못했습니다.<br>
          ${escapeHtml(err.message)}
          <br><br>
          Apps Script URL 또는 배포 권한을 확인해주세요.
        </div>
      `;
    }
  }
}

    function renderTypeOptions(types) {
      const current = typeFilter.value;

      typeFilter.innerHTML = '<option value="">전체 종류</option>';

      types.forEach(type => {
        const option = document.createElement('option');
        option.value = type;
        option.textContent = type;
        typeFilter.appendChild(option);
      });

      if ([...typeFilter.options].some(opt => opt.value === current)) {
        typeFilter.value = current;
      }
    }

    function toggleStock() {
      excludeZeroStock = !excludeZeroStock;

      if (excludeZeroStock) {
        stockToggle.classList.add('active');
        stockToggle.textContent = '0 제외 ON';
      } else {
        stockToggle.classList.remove('active');
        stockToggle.textContent = '0 제외 OFF';
      }

      renderList();
    }

    function getFilteredData() {
    const selectedType = typeFilter.value;
const rawKeyword = searchInput.value.trim().toLowerCase();
const keyword = normalizeSearchText(rawKeyword);

      let filtered = allData.filter(item => {
        const matchType = !selectedType || item.type === selectedType;

  const searchText = [
  item.code,
  item.type,
  item.name,
  item.vintage,
  item.country,
  item.storage,
  item.quantity,
  item.service,
  item.receiveHistory,
  item.purchaseHistory,
  item.price,
  item.note
].join(' ').toLowerCase();

const normalizedSearchText = normalizeSearchText(searchText);

const matchKeyword =
  !keyword ||
  searchText.includes(rawKeyword) ||
  normalizedSearchText.includes(keyword);
        const matchStock = !excludeZeroStock || Number(item.quantityNumber || 0) > 0;

        return matchType && matchKeyword && matchStock;
      });

      const sortValue = sortFilter.value;

      filtered.sort((a, b) => {
        if (sortValue === 'nameAsc') {
          return String(a.name || '').localeCompare(String(b.name || ''), 'ko');
        }

        if (sortValue === 'priceDesc') {
          return Number(b.priceNumber || 0) - Number(a.priceNumber || 0);
        }

        if (sortValue === 'priceAsc') {
          return Number(a.priceNumber || 0) - Number(b.priceNumber || 0);
        }

        if (sortValue === 'qtyDesc') {
          return Number(b.quantityNumber || 0) - Number(a.quantityNumber || 0);
        }

        return String(a.code || '').localeCompare(String(b.code || ''), 'ko');
      });

      return filtered;
    }

    function renderList() {
      const filtered = getFilteredData();

      summary.textContent = `표시 ${filtered.length}개 / 전체 ${allData.length}개`;

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">표시할 와인이 없습니다.</div>';
        return;
      }

      list.innerHTML = filtered.map(item => createCard(item)).join('');

      loadImages();
    }

    function createCard(item) {
      const qtyNumber = Number(item.quantityNumber || 0);
      const quantityClass = qtyNumber <= 0 ? 'zero' : '';

      return `
        <div class="card" onclick="openModal('${escapeAttr(item.code)}')">
          <div class="image-wrap" data-code="${escapeAttr(item.code)}">
            <span class="badge">${escapeHtml(item.type || '-')}</span>
            사진 불러오는 중...
          </div>

          <div class="card-body">
            <div class="code">${escapeHtml(item.code)}</div>
            <div class="name">${escapeHtml(item.name)}</div>

            <div class="quick-info">
              <span class="chip">${escapeHtml(item.vintage || '빈티지 없음')}</span>
              <span class="chip">${escapeHtml(item.country || '생산국 없음')}</span>
              <span class="chip ${quantityClass}">수량 ${escapeHtml(item.quantity || '0')}</span>
            </div>

            <div class="meta">
              <div class="label">보관</div>
              <div class="value">${escapeHtml(item.storage)}</div>

              <div class="label">가격</div>
              <div class="value price">${escapeHtml(item.price)}</div>

              <div class="label">서비스</div>
              <div class="value">${escapeHtml(shortText(item.receiveHistory, 45))}</div>
            </div>

            ${item.note ? `<div class="note">${escapeHtml(item.note)}</div>` : ''}
          </div>
        </div>
      `;
    }

    function loadImages() {
      const imageBoxes = document.querySelectorAll('.image-wrap');

      imageBoxes.forEach(box => {
        const code = box.dataset.code;
        const item = allData.find(x => x.code === code);

        if (!item || !item.imageUrl) {
          box.innerHTML = `<span class="badge">사진 없음</span>사진 없음`;
          return;
        }

        const typeBadge = box.querySelector('.badge')?.outerHTML || '';

        box.innerHTML = `
          ${typeBadge}
          <img 
            src="${escapeAttr(item.imageUrl)}" 
            alt="${escapeAttr(item.code)}"
            loading="lazy"
            onerror="this.parentElement.innerHTML='<span class=&quot;badge&quot;>사진 없음</span>사진 없음';"
          >
        `;
      });
    }

    function openModal(code) {
      const item = allData.find(x => x.code === code);
      if (!item) return;

      modalBackdrop.classList.add('show');

      modalCode.textContent = item.code || '';
      modalTitle.textContent = item.name || '';

      if (item.imageUrl) {
        modalImage.innerHTML = `
          <img 
            src="${escapeAttr(item.imageUrl)}" 
            alt="${escapeAttr(item.code)}"
            onerror="this.parentElement.textContent='사진 없음';"
          >
        `;
      } else {
        modalImage.textContent = '사진 없음';
      }

      modalDetail.innerHTML = `
        ${detailRow('종류', item.type)}
        ${detailRow('빈티지', item.vintage)}
        ${detailRow('생산국', item.country)}
        ${detailRow('보관장소', item.storage)}
        ${detailRow('보유수량', item.quantity)}
        ${detailRow('서비스 사용중', item.service)}
        ${detailRow('소진 이력', item.receiveHistory)}
        ${detailRow('구매 이력', item.purchaseHistory)}
        ${detailRow('와인가격', item.price)}
        ${detailRow('특이 사항', item.note)}
      `;
    }

    function detailRow(label, value) {
      return `
        <div class="detail-label">${escapeHtml(label)}</div>
        <div class="detail-value">${escapeHtml(value || '-')}</div>
      `;
    }

    function closeModal() {
      modalBackdrop.classList.remove('show');
    }

    function closeModalByBackdrop(event) {
      if (event.target === modalBackdrop) {
        closeModal();
      }
    }

    function shortText(value, maxLength) {
      const text = String(value || '');
      if (text.length <= maxLength) return text;
      return text.slice(0, maxLength) + '...';
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return '';

      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

function escapeAttr(value) {
  return escapeHtml(value).replaceAll('\n', ' ');
}

function normalizeSearchText(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/\s+/g, '')           // 모든 공백 제거
    .replace(/[()［］\[\]{}]/g, '') // 괄호 제거
    .replace(/[ㆍ·,._\-\/]/g, '');  // 특수문자 일부 제거
}

typeFilter.addEventListener('change', renderList);
sortFilter.addEventListener('change', renderList);
searchInput.addEventListener('input', renderList);

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeModal();
      }
    });

    loadData();
  </script>
</body>
</html>
